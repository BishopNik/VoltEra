<!doctype html><html lang="uk"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Вхід | ІНК CRM</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0a1713;color:#f6f3e9;font-family:Inter,Arial,sans-serif;background-image:radial-gradient(circle at 80% 20%,#234230,transparent 35%)}main{width:min(420px,calc(100% - 28px));padding:40px;border:1px solid #ffffff1c;border-radius:25px;background:#10231dcc;box-shadow:0 35px 90px #0008}img{display:block;width:120px;margin:0 auto 35px;filter:drop-shadow(0 10px 20px #0006)}p{color:#91a099;font-size:12px;line-height:1.6}h1{font-size:36px;margin:0 0 10px}label{display:block;margin:20px 0;color:#91a099;font-size:10px;text-transform:uppercase}input{display:block;width:100%;margin-top:8px;padding:14px;border:1px solid #ffffff24;border-radius:10px;background:#06100d;color:#fff;outline:none}input:focus{border-color:#e98b22}button{width:100%;padding:14px;border:0;border-radius:99px;background:#e98b22;color:#fff;font-weight:800;cursor:pointer}.password-field{position:relative;display:block;margin-top:8px}.password-field input{margin-top:0;padding-right:100px}.password-toggle{position:absolute;right:7px;top:50%;width:auto;padding:8px 10px;border:1px solid #ffffff1c;border-radius:8px;background:#172d25;color:#d6e978;font-size:10px;line-height:1;transform:translateY(-50%)}.password-toggle:hover,.password-toggle:focus-visible{border-color:#d6e978;background:#203a31;outline:none}.error{min-height:18px;color:#ff8c78;text-align:center}small{display:block;margin-top:20px;color:#64736c;text-align:center}</style></head><body><main><img src="/assets/brand/ink-logo-transparent.png" alt="ІНК"><h1>Вхід до CRM</h1><p>Заявки, відгуки, питання та контент в одному захищеному просторі.</p><form id="login" method="post" action="/api/auth/login"><label>Користувач<input name="user" autocomplete="username" required></label><label>Пароль<span class="password-field"><input name="password" type="password" autocomplete="current-password" required><button class="password-toggle" type="button" aria-label="Показати пароль" aria-pressed="false">Показати</button></span></label><p class="error" role="status" aria-live="polite"></p><button>Увійти →</button></form><small>Доступ лише для команди ІНК</small></main><script>
const loginForm=document.querySelector('#login');
const loginError=document.querySelector('.error');
const passwordInput=loginForm.elements.password;
const passwordToggle=document.querySelector('.password-toggle');
function clearLoginError(){loginError.textContent='';}
loginForm.addEventListener('input',clearLoginError);
passwordToggle.addEventListener('click',()=>{
  const isVisible=passwordInput.type==='text';
  passwordInput.type=isVisible?'password':'text';
  passwordToggle.textContent=isVisible?'Показати':'Сховати';
  passwordToggle.setAttribute('aria-label',isVisible?'Показати пароль':'Сховати пароль');
  passwordToggle.setAttribute('aria-pressed',String(!isVisible));
  passwordInput.focus({preventScroll:true});
});
loginForm.addEventListener('submit',async event=>{
  event.preventDefault();
  clearLoginError();
  const formData=new FormData(loginForm);
  try{
    const response=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.fromEntries(formData))});
    if(response.ok){location.href='/admin.html';return;}
    loginError.textContent='Невірний логін або пароль';
  }catch{
    loginError.textContent='Не вдалося підключитися до CRM. Спробуйте ще раз.';
  }
});
</script></body></html>
